services:
  mongo:
    image: mongo:latest
    container_name: mongo
    ports:
      - "27017:27017"
    networks:
      - app_network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5007:5007"
    environment:
      DB_CONNECTION_STRING: mongodb://mongo:27017/mosaic
    depends_on:
      - mongo
    networks:
      - app_network

networks:
  app_network:
